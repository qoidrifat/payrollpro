version: '3.8'

services:
  # ─── Laravel Application ────────────────────────────────────────
  app:
    build:
      context: .
      target: app
    image: project-kp:latest
    container_name: project-kp-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-project_kp}
      - DB_USERNAME=${DB_USERNAME:-project_kp}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - SESSION_DRIVER=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_ENCRYPT=true
      - SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN:-}
    volumes:
      - storage_data:/app/storage
      - public_assets:/app/public/build
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    networks:
      - project-kp

  # ─── Queue Worker ──────────────────────────────────────────────
  queue:
    build:
      context: .
      target: queue-worker
    container_name: project-kp-queue
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-project_kp}
      - DB_USERNAME=${DB_USERNAME:-project_kp}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN:-}
    volumes:
      - storage_data:/app/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    networks:
      - project-kp

  # ─── Scheduler ─────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      target: scheduler
    container_name: project-kp-scheduler
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-project_kp}
      - DB_USERNAME=${DB_USERNAME:-project_kp}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN:-}
    volumes:
      - storage_data:/app/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    networks:
      - project-kp

  # ─── MySQL Database ────────────────────────────────────────────
  database:
    image: mysql:8.0
    container_name: project-kp-db
    ports:
      - "${DB_PORT_MAP:-3307}:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-project_kp}
      - MYSQL_USER=${DB_USERNAME:-project_kp}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - project-kp

  # ─── Redis Cache ───────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: project-kp-redis
    ports:
      - "${REDIS_PORT_MAP:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - project-kp

  # ─── Nginx (optional for production) ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: project-kp-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - project-kp
    profiles:
      - production

volumes:
  mysql_data:
  redis_data:
  storage_data:
  public_assets:

networks:
  project-kp:
    driver: bridge
