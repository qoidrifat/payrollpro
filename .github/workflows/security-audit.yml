name: Security Audit (Scheduled)

on:
  schedule:
    # Auto-run every Monday 06:00 WIB (22:00 UTC Sunday)
    - cron: '0 22 * * 0'
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  vulnerability-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, gd, zip
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: sec-audit-${{ hashFiles('composer.lock') }}
          restore-keys: sec-audit-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Composer Audit
        id: composer-audit
        continue-on-error: true
        run: |
          echo "🔐 Running Composer Security Audit..."
          composer audit --format=json > composer-audit-report.json 2>/dev/null || true
          echo "status=done" >> "$GITHUB_OUTPUT"

      - name: Parse audit results
        id: parse-results
        run: |
          if [ -f composer-audit-report.json ]; then
            ADVISORIES=$(php -r "
              \$report = json_decode(file_get_contents('composer-audit-report.json'), true);
              \$count = 0;
              if (isset(\$report['advisories'])) {
                foreach (\$report['advisories'] as \$pkg => \$advs) {
                  \$count += count(\$advs);
                }
              }
              echo \$count;
            ")
            echo "advisory_count=$ADVISORIES" >> "$GITHUB_OUTPUT"
            echo "Found $ADVISORIES advisory(ies)"
          else
            echo "advisory_count=0" >> "$GITHUB_OUTPUT"
            echo "No JSON report available"
          fi

      - name: Create issue for vulnerabilities
        if: steps.parse-results.outputs.advisory_count > 0
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('composer-audit-report.json', 'utf8'));
            let body = '## 🔴 Composer Vulnerability Report\n\n';
            body += 'Found vulnerabilities in the following packages:\n\n';
            body += '| Package | Severity | CVE |\n';
            body += '|---------|----------|-----|\n';
            if (report.advisories) {
              for (const [pkg, advisories] of Object.entries(report.advisories)) {
                for (const adv of advisories) {
                  const sev = adv.severity || 'unknown';
                  const cve = adv.cve || 'N/A';
                  body += `| ${pkg} | ${sev} | ${cve} |\n`;
                }
              }
            }
            body += '\n\nRun `composer audit` locally for details.\n';
            body += '\n---\n*Generated by scheduled Security Audit workflow*';

            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'dependencies']
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Composer Vulnerabilities Detected (${new Date().toISOString().slice(0, 10)})`,
                body: body,
                labels: ['security', 'dependencies', 'automated']
              });
              console.log('Created vulnerability issue.');
            } else {
              // Update existing issue
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: body
              });
              console.log(`Updated existing issue #${issue.number}.`);
            }

      - name: No vulnerabilities found
        if: steps.parse-results.outputs.advisory_count == 0
        run: |
          echo "✅ No vulnerabilities found. All dependencies are clean!"
          echo "Advisory count: ${{ steps.parse-results.outputs.advisory_count }}"

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit-report
          path: composer-audit-report.json
          retention-days: 30

  lockfile-validation:
    name: Lockfile & Deprecation Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json
        run: composer validate --no-check-all --no-check-publish

      - name: Check npm audit
        continue-on-error: true
        run: |
          npm audit --audit-level=high || echo "npm audit found issues (non-blocking)"

      - name: Summary
        run: |
          echo "═══════════════════════════════════"
          echo "  📋 Weekly Security Audit"
          echo "  • Composer validate : checked"
          echo "  • npm audit         : checked"
          echo "  • Lockfile          : checked"
          echo "═══════════════════════════════════"
